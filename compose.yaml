services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    image: salsinmiedo-front:local
    ports:
      - "8080:80"
    restart: unless-stopped
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    image: salsinmiedo-back:local
    environment:
      DATABASE_URL: postgresql://${USERS_DB_USER}:${USERS_DB_PASSWORD}@users-db:5432/${USERS_DB_NAME}?schema=public
      FRONTEND_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      users-db:
        condition: service_healthy
  users-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${USERS_DB_NAME}
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - users-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  users-db-data:
