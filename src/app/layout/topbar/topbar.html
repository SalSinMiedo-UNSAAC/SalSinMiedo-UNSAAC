<header
  class="sticky top-0 z-30 flex h-[92px] items-center border-b border-slate-200/80 bg-white/90 px-4 backdrop-blur-xl sm:px-6 lg:px-10"
>
  <div class="mx-auto flex w-full max-w-[1500px] items-center gap-5">
    <button
      type="button"
      class="grid size-11 place-items-center rounded-xl border border-slate-200 text-slate-700 lg:hidden"
      aria-label="Abrir menú"
      aria-controls="main-navigation"
      (click)="menuToggle.emit()"
    >
      <lucide-icon [img]="Menu" class="size-5" />
    </button>

    <label
      class="flex h-14 w-full max-w-[620px] items-center gap-4 rounded-xl border border-slate-200 bg-white px-5 shadow-sm transition focus-within:border-indigo-400 focus-within:ring-4 focus-within:ring-indigo-100"
    >
      <lucide-icon
        [img]="Search"
        class="size-5 text-slate-400"
        [strokeWidth]="2"
      />

      <input
        #searchInput
        type="search"
        placeholder="Buscar trámites, requisitos o instituciones..."
        class="min-w-0 flex-1 border-0 bg-transparent text-sm text-slate-800 outline-none placeholder:text-slate-400"
      />

      <kbd
        class="hidden rounded-lg bg-slate-100 px-2.5 py-1 text-xs text-slate-500 sm:block"
      >
        Ctrl K
      </kbd>
    </label>

    <div class="ml-auto flex items-center gap-3">
      <a
        routerLink="/notificaciones"
        class="relative grid size-12 place-items-center rounded-full border border-slate-200 bg-white text-[#111c4e] shadow-sm transition hover:bg-slate-50"
        aria-label="Notificaciones"
      >
        <lucide-icon [img]="Bell" class="size-6" />

        <span
          class="absolute right-0 top-0 grid size-5 translate-x-0.5 -translate-y-0.5 place-items-center rounded-full bg-red-500 text-[10px] font-bold text-white ring-2 ring-white"
        >
          3
        </span>
      </a>

      <div class="relative">
      <button
        type="button"
        class="flex items-center gap-3 rounded-xl p-1.5 transition hover:bg-slate-50"
        [attr.aria-expanded]="isAccountMenuOpen()"
        aria-haspopup="menu"
        (click)="toggleAccountMenu()"
      >
        <div
          class="grid size-11 place-items-center rounded-full bg-gradient-to-br from-indigo-100 to-indigo-300 font-bold text-indigo-900"
        >
          {{ userInitial() }}
        </div>

        <div class="hidden text-left md:block">
          <p class="text-sm font-bold text-[#111c4e]">
            {{ userFirstName() }}
          </p>

          <p class="text-xs text-slate-500">
            Mi cuenta
          </p>
        </div>

        <lucide-icon
          [img]="ChevronDown"
          class="hidden size-4 text-slate-500 md:block"
        />
      </button>

      @if (isAccountMenuOpen()) {
        <div class="absolute right-0 top-[calc(100%+10px)] z-50 w-56 overflow-hidden rounded-2xl border border-slate-200 bg-white p-2 shadow-[0_18px_45px_rgba(15,23,42,0.16)]" role="menu">
          <div class="border-b border-slate-100 px-3 py-3">
            <p class="truncate text-sm font-bold text-[#111c4e]">{{ auth.user()?.name }}</p>
            <p class="mt-1 truncate text-xs text-slate-500">{{ auth.user()?.email }}</p>
          </div>
          <a routerLink="/perfil" class="mt-2 flex min-h-11 items-center gap-3 rounded-xl px-3 text-sm font-medium text-slate-700 transition hover:bg-indigo-50 hover:text-indigo-700" role="menuitem" (click)="isAccountMenuOpen.set(false)">
            <lucide-icon [img]="UserRound" class="size-4" />
            Ir a mi perfil
          </a>
          <button type="button" class="flex min-h-11 w-full items-center gap-3 rounded-xl px-3 text-left text-sm font-medium text-red-600 transition hover:bg-red-50" role="menuitem" (click)="logout()">
            <lucide-icon [img]="LogOut" class="size-4" />
            Cerrar sesión
          </button>
        </div>
      }
      </div>
    </div>
  </div>
</header>
